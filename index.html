<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Information Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="form-container">
        <h2>Client Information Form</h2>
        <form id="clientForm">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required />
            </div>
            <div class="form-group">
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob" required />
            </div>
            <div class="form-group">
                <label for="retirementAge">Desired Retirement Age:</label>
                <input type="number" id="retirementAge" name="retirementAge" required />
            </div>
            <div class="form-group">
                <label for="mortalityAge">Planned Mortality Age:</label>
                <input type="number" id="mortalityAge" name="mortalityAge" required />
            </div>
            <div class="form-group">
                <label for="inflationRate">Inflation Rate (%):</label>
                <input type="number" step="0.01" id="inflationRate" name="inflationRate" required />
            </div>
            <button type="submit">Submit</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
