<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.login-card{
    width:380px;
    background:#fff;
    padding:40px 30px;
    border-radius:14px;
    box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.login-card h1{
    text-align:center;
    color:#1d2b4f;
    font-size:36px;
    margin-bottom:10px;
}

.login-card p{
    text-align:center;
    color:#8b93a7;
    font-size:14px;
    margin-bottom:35px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:#222;
    margin-bottom:8px;
}

.input-box{
    position:relative;
}

.input-box i{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    color:#b0b6c3;
    font-size:14px;
}

.input-box input{
    width:100%;
    height:46px;
    border:1px solid #e2e5ec;
    border-radius:8px;
    padding-left:42px;
    outline:none;
    font-size:14px;
    transition:.3s;
}

.input-box input:focus{
    border-color:#5b4ef5;
    box-shadow:0 0 0 3px rgba(91,78,245,.15);
}

.input-box input::placeholder{
    color:#b4bac7;
}

button{
    width:100%;
    height:48px;
    margin-top:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(90deg,#5b4ef5,#5c3df6);
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(91,78,245,.35);
}

button i{
    margin-left:8px;
}
</style>

</head>
<body>

<div class="login-card">

    <h1>Login</h1>

    <p>
        Please enter your credentials to access your account.
    </p>

    <form>

        <div class="form-group">
            <label>ID</label>

            <div class="input-box">
                <i class="fa-regular fa-user"></i>
                <input
                    type="text"
                    placeholder="Enter your ID"
                    required>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>

            <div class="input-box">
                <i class="fa-solid fa-key"></i>
                <input
                    type="password"
                    placeholder="Enter your password"
                    required>
            </div>
        </div>

        <button type="submit">
            login
            <i class="fa-solid fa-arrow-right"></i>
        </button>

    </form>

</div>

</body>
</html>
