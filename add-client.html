<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Client</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/add-client.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">
</head>
<body>

    <main id="pageContent" class="add-client-page" hidden>

        <header class="page-header">
            <div>
                <h1>Add Client</h1>
                <p>Create the client’s basic profile.</p>
            </div>

            <a href="dashboard.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i>
                Back to Dashboard
            </a>
        </header>

        <form id="addClientForm" class="client-form-card">

            <section class="form-section">
                <h2>Personal Information</h2>

                <div class="form-grid">

                    <div class="form-group form-group--full">
                        <label for="fullName">Full Name</label>

                        <input
                            id="fullName"
                            name="fullName"
                            class="form-control"
                            type="text"
                            placeholder="Enter client's full name"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="dateOfBirth">Date of Birth</label>

                        <input
                            id="dateOfBirth"
                            name="dateOfBirth"
                            class="form-control"
                            type="date">
                    </div>

                    <div class="form-group">
                        <label for="gender">Gender</label>

                        <select
                            id="gender"
                            name="gender"
                            class="form-control">

                            <option value="">Select gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                            <option value="prefer_not_to_say">
                                Prefer not to say
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="maritalStatus">Marital Status</label>

                        <select
                            id="maritalStatus"
                            name="maritalStatus"
                            class="form-control">

                            <option value="">Select status</option>
                            <option value="single">Single</option>
                            <option value="married">Married</option>
                            <option value="divorced">Divorced</option>
                            <option value="widowed">Widowed</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="occupation">Occupation</label>

                        <input
                            id="occupation"
                            name="occupation"
                            class="form-control"
                            type="text"
                            placeholder="Enter occupation">
                    </div>

                </div>
            </section>

            <section class="form-section">
                <h2>Contact Information</h2>

                <div class="form-grid">

                    <div class="form-group">
                        <label for="phone">Phone Number</label>

                        <input
                            id="phone"
                            name="phone"
                            class="form-control"
                            type="tel"
                            placeholder="Enter phone number">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>

                        <input
                            id="email"
                            name="email"
                            class="form-control"
                            type="email"
                            placeholder="Enter email address">
                    </div>

                </div>
            </section>

            <section class="form-section">
                <h2>Notes</h2>

                <div class="form-group">
                    <label for="notes">General Notes</label>

                    <textarea
                        id="notes"
                        name="notes"
                        class="form-control"
                        placeholder="Enter any notes about the client"></textarea>
                </div>
            </section>

            <p
                id="formMessage"
                class="form-message"
                aria-live="polite">
            </p>

            <div class="form-actions">
                <a href="dashboard.html" class="cancel-button">
                    Cancel
                </a>

                <button id="saveClientButton" class="save-button" type="submit">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Save Client
                </button>
            </div>

        </form>

    </main>

    <p id="loadingMessage" class="loading-message">
        Checking login...
    </p>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/add-client.js"></script>

</body>
</html>
